# Lighthouse CI — runs Lighthouse audits on every PR.
#
# Boots `next start` against a production build, then runs the audits
# from `.lighthouserc.cjs`. Reports are uploaded to Lighthouse CI's
# temporary public storage; the action surfaces a link in the PR check.
#
# Budgets per docs/specs/2026-05-14-seo-spec.md §6.1.

name: Lighthouse

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "design/**"
      - "*.md"
      - "LICENSE"
      - ".claude/**"
      - ".mcp.json"

permissions:
  contents: read

jobs:
  lighthouse:
    name: Lighthouse audits
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Lighthouse CI
        run: |
          npm install --no-save @lhci/cli@0.13.x
          npx lhci autorun \
            --config=.lighthouserc.cjs \
            --collect.startServerCommand='npm start' \
            --collect.startServerReadyPattern='Ready in'
